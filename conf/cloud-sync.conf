# Format: 
# [DEFAULTS]          - Globale Standardwerte
# new=true/false      - Neue Dateien synchronisieren
# change=true/false   - Änderungen synchronisieren
# delete=true/false   - Löschungen synchronisieren
#
# [JobName]           - Job-spezifische Einstellungen
# source='pfad/zum/quellordner'
# destination='pfad/zum/zielordner'
# new=true/false      - (optional) Überschreibt DEFAULTS
# change=true/false   - (optional) Überschreibt DEFAULTS
# delete=true/false   - (optional) Überschreibt DEFAULTS

[DEFAULTS]
new=true
change=true
delete=false

[Hörbücher]
source='/mnt/hdd/nas/shared audiobooks'
destination='/mnt/hdd/hetzner/jellyfin/audiobooks'

[e-Books]
source='/mnt/hdd/nas/shared ebooks'
destination='/mnt/hdd/hetzner/jellyfin/ebooks'

[Musik]
source='/mnt/hdd/nas/shared music'
destination='/mnt/hdd/hetzner/jellyfin/music'

[Fotos]
source='/mnt/hdd/nas/shared pictures'
destination='/mnt/hdd/hetzner/jellyfin/pictures'

[Videos]
source='/mnt/hdd/nas/shared videos'
destination='/mnt/hdd/hetzner/jellyfin/videos'
# Beispiel: Job-spezifische Überschreibung der DEFAULTS
# change=false
# delete=true

[Paperless-NGX]
